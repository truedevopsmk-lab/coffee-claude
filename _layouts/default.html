<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{{ page.title }} | {{ site.title }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="{{ "/assets/coffee.css" | relative_url }}">

  <!-- PWA Manifest -->
  <link rel="manifest" href="/coffee-claude/manifest.json">
  <meta name="theme-color" content="#b5621e">

  <!-- iOS PWA support -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Coffee Journal">
  <link rel="apple-touch-icon" href="/coffee-claude/assets/icons/icon-192.png">

  <!-- OneSignal Push Notifications -->
  <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
  <script>
    window.OneSignalDeferred = window.OneSignalDeferred || [];
    OneSignalDeferred.push(async function(OneSignal) {
      await OneSignal.init({
        appId: "1d199315-1efa-496e-8cff-06894493dbd2",
        safari_web_id: "",
        notifyButton: {
          enable: true,
          size: 'medium',
          theme: 'default',
          position: 'bottom-right',
          text: {
            'tip.state.unsubscribed': 'Get brew reminders',
            'tip.state.subscribed': 'Notifications on',
            'tip.state.blocked': 'Notifications blocked',
            'message.prenotify': 'Click to subscribe to brew reminders',
            'message.action.subscribed': "You're subscribed!",
            'message.action.resubscribed': "You're subscribed!",
            'message.action.unsubscribed': "You won't receive brew reminders",
            'dialog.main.title': 'Manage Notifications',
            'dialog.main.button.subscribe': 'Subscribe',
            'dialog.main.button.unsubscribe': 'Unsubscribe',
            'dialog.blocked.title': 'Unblock Notifications',
            'dialog.blocked.body': 'Enable notifications in your browser settings.'
          }
        },
        welcomeNotification: {
          title: "Coffee Journal",
          message: "Thanks for subscribing to brew reminders! ☕",
        },
        promptOptions: {
          slidedown: {
            prompts: [
              {
                type: "push",
                autoPrompt: false,
                text: {
                  actionMessage: "Would you like brew reminders from your Coffee Journal?",
                  acceptButton: "Yes, notify me",
                  cancelButton: "Not now"
                },
                delay: {
                  pageViews: 2,
                  timeDelay: 10
                }
              }
            ]
          }
        }
      });
    });
  </script>
</head>
<body>
  <div class="site">

    <aside class="sidebar">
      <h1>Coffee Journal</h1>
      <p>Brewing notes, beans, and experiments.</p>

      <nav class="nav">
      <a href="{{ "/" | relative_url }}">Home</a>
      <a href="{{ "/brews/" | relative_url }}">Brews</a>
      <a href="{{ "/beans/" | relative_url }}">Beans</a>
      <a href="{{ "/methods/" | relative_url }}">Methods</a>
      <a href="{{ "/brews-and-frames/" | relative_url }}">Brews &amp; Frames</a>
      <a href="{{ "/tools/brew-calculator/" | relative_url }}">Tools</a>
      <a href="{{ "/notifications/" | relative_url }}">🔔 Reminders</a>
      </nav>
    </aside>

    <main class="content">
      {% if page.title %}
        <h1>{{ page.title }}</h1>
      {% endif %}
      {{ content }}
    </main>

  </div>

<!-- Service Worker Registration -->
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/coffee-claude/sw.js')
        .then(reg => console.log('SW registered:', reg.scope))
        .catch(err => console.warn('SW registration failed:', err));
    });
  }
</script>
</body>
</html>
